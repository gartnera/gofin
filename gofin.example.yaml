# gofin server configuration.
server_name: gofin
listen: ":8096"        # Jellyfin's default port
database: gofin.db      # sqlite database file
# web_root: ./web      # serve the official jellyfin-web bundle at /web/ when set
# quick_connect: true  # passwordless code login; enabled by default (set false to disable)

libraries:
  - name: Movies
    type: movies        # one of: movies, tvshows, music
    path: /media/movies
  - name: TV Shows
    type: tvshows
    path: /media/tv
  - name: Music
    type: music
    path: /media/music

# Optional tuning for the live filesystem watcher. Defaults shown; omit the
# block to use them. On large libraries this caps the number of inotify watches
# (Linux enforces fs.inotify.max_user_watches): container directories are always
# watched so new folders are detected, but a leaf folder (a movie/season/album)
# is watched only when modified within window_days. The periodic rescan re-indexes
# anything the window left unwatched.
# watch:
#   window_days: 7    # watch leaf dirs modified within this many days (0 = watch all)
#   rescan_hours: 24  # periodic full rescan interval (0 = disable)

# Optional remote metadata fetching (movies + TV series via TMDb). Disabled by
# default: with no token, gofin makes no outbound network calls. Local NFO,
# on-disk artwork and locked fields always take precedence over remote data.
metadata:
  enabled: false
  tmdb_token: ""              # TMDb v4 read-access token (required when enabled)
  cache_dir: metadata-cache   # where downloaded posters are cached
  ttl_days: 14                # how long a cached remote response stays fresh
